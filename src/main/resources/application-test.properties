server.port=0

# Database configuration - TEST (fallback to in-memory DB if DB_TEST_* is not defined)
spring.datasource.url=${TEST_DB_URL:${DB_TEST_URL:jdbc:h2:mem:nexus_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}}
spring.datasource.username=${TEST_DB_USERNAME:${DB_TEST_USER:sa}}
spring.datasource.password=${TEST_DB_PASSWORD:${DB_TEST_PASSWORD:}}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000
management.health.mail.enabled=false

# Stripe (tests cargan el contexto completo; valores dummy si no hay .env)
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.currency=${STRIPE_CURRENCY:usd}

# JWT configuration - TEST (values from .env)
security.jwt.secret=${TEST_JWT_SECRET:${JWT_TEST_SECRET:${JWT_SECRET:${jwt_secret:}}}}
security.jwt.expiration=${TEST_JWT_EXPIRATION:${JWT_TEST_EXPIRATION:${JWT_EXPIRATION:${jwt_expiration:3600000}}}}
