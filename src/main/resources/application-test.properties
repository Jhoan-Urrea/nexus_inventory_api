server.port=0

# Database configuration - TEST (fallback to in-memory DB if DB_TEST_* is not defined)
spring.datasource.url=${DB_TEST_URL:jdbc:h2:mem:nexus_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${DB_TEST_USER:sa}
spring.datasource.password=${DB_TEST_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# JWT configuration - TEST (values from .env)
security.jwt.secret=${JWT_TEST_SECRET:VGhpcy1pcy1hLXRlc3Qtc2VjcmV0LWtleS1mb3Itand0LTEyMzQ1Njc4OTAxMjM=}
security.jwt.expiration=${JWT_TEST_EXPIRATION:3600000}
