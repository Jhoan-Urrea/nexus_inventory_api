spring.application.name=nexus_inventory_api

# Puerto por defecto (se puede sobrescribir en otros perfiles)
server.port=8080  

spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
# Agrupa cargas LAZY en lotes para reducir round-trips (N+1 residual)
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none

# HikariCP (pool de conexiones)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# CORS configuration for web clients
app.cors.allowed-origin-patterns=http://localhost:3000,http://127.0.0.1:3000,https://main.d1lsjisak0zjs4.amplifyapp.com
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.max-age=3600
app.security.trust-forwarded-headers=false

# Password recovery
app.auth.password-recovery.mail-from=${APP_MAIL_FROM:${MAIL_USERNAME:}}
app.auth.cookies.access-token-name=access_token
app.auth.cookies.refresh-token-name=refresh_token
app.auth.cookies.http-only=true
app.auth.cookies.secure=false
app.auth.cookies.same-site=Lax
app.auth.cookies.path=/
app.auth.cookies.access-token-max-age-seconds=900
app.auth.cookies.refresh-token-max-age-seconds=604800
security.password-reset.expiration=${PASSWORD_RESET_EXPIRATION_MS:600000}
security.password-reset.max-verification-attempts=${PASSWORD_RESET_MAX_VERIFICATION_ATTEMPTS:5}

# SMTP configuration
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=${MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Perfil activo (cambiar segun el entorno que quieras usar)
spring.profiles.active=dev

spring.config.import=optional:file:.env[.properties]

# Actuator metrics exposure
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
