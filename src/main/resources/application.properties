spring.application.name=nexus_inventory_api

# Puerto por defecto (se puede sobrescribir en otros perfiles)
server.port=8080

spring.jpa.properties.hibernate.format_sql=false
spring.jpa.show-sql=false
# Agrupa cargas LAZY en lotes para reducir round-trips (N+1 residual)
spring.jpa.properties.hibernate.default_batch_fetch_size=16
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=none

# HikariCP (pool de conexiones)
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# CORS configuration for web clients
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS}
app.cors.max-age=${APP_CORS_MAX_AGE}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS}
app.security.trust-forwarded-headers=${APP_SECURITY_TRUST_FORWARDED_HEADERS}
app.security.permit-swagger-documentation=${APP_SECURITY_PERMIT_SWAGGER_DOCUMENTATION}
app.security.actuator-admin-only=${APP_SECURITY_ACTUATOR_ADMIN_ONLY}
app.security.actuator-health-public=${APP_SECURITY_ACTUATOR_HEALTH_PUBLIC}
app.security.permit-public-locations=${APP_SECURITY_PERMIT_PUBLIC_LOCATIONS}
app.security.csrf-enabled=${APP_SECURITY_CSRF_ENABLED}
app.security.csrf-cookie-name=${APP_SECURITY_CSRF_COOKIE_NAME}
app.security.csrf-header-name=${APP_SECURITY_CSRF_HEADER_NAME}
app.security.csrf-cookie-http-only=${APP_SECURITY_CSRF_COOKIE_HTTP_ONLY}

# Password recovery
app.auth.password-recovery.mail-from=${APP_MAIL_FROM:${MAIL_USERNAME:}}
app.auth.cookies.access-token-name=${APP_AUTH_COOKIES_ACCESS_TOKEN_NAME}
app.auth.cookies.refresh-token-name=${APP_AUTH_COOKIES_REFRESH_TOKEN_NAME}
app.auth.cookies.http-only=${APP_AUTH_COOKIES_HTTP_ONLY}
app.auth.cookies.secure=${APP_AUTH_COOKIES_SECURE}
app.auth.cookies.same-site=${APP_AUTH_COOKIES_SAME_SITE}
app.auth.cookies.path=${APP_AUTH_COOKIES_PATH}
app.auth.cookies.domain=${APP_AUTH_COOKIES_DOMAIN}
app.auth.cookies.access-token-max-age-seconds=${APP_AUTH_COOKIES_ACCESS_TOKEN_MAX_AGE_SECONDS}
app.auth.cookies.refresh-token-max-age-seconds=${APP_AUTH_COOKIES_REFRESH_TOKEN_MAX_AGE_SECONDS}
security.jwt.secret=${jwt_secret}
security.jwt.expiration=${jwt_expiration}
security.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}
security.password-reset.expiration=${PASSWORD_RESET_EXPIRATION_MS}
security.password-reset.max-verification-attempts=${PASSWORD_RESET_MAX_VERIFICATION_ATTEMPTS}

# SMTP configuration
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=${MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${MAIL_SMTP_STARTTLS_REQUIRED:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# OpenAPI / Swagger deshabilitados por defecto; habilitar solo por perfil si hace falta
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
openapi.server-url=${OPENAPI_SERVER_URL}

spring.config.import=optional:file:.env[.properties]

# Actuator exposure reducido por defecto
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
