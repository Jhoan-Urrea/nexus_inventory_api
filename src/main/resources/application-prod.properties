server.port=${PORT:10000}
server.address=0.0.0.0

# Database configuration - PROD
spring.datasource.url=${PROD_DB_URL:${DB_PROD_URL:}}
spring.datasource.username=${PROD_DB_USERNAME:${DB_PROD_USER:}}
spring.datasource.password=${PROD_DB_PASSWORD:${DB_PROD_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
spring.flyway.enabled=false

# HikariCP
spring.datasource.hikari.maximum-pool-size=${PROD_DB_POOL_MAX_SIZE:${DB_POOL_MAX_SIZE:10}}
spring.datasource.hikari.minimum-idle=${PROD_DB_POOL_MIN_IDLE:${DB_POOL_MIN_IDLE:2}}
spring.datasource.hikari.idle-timeout=${PROD_DB_POOL_IDLE_TIMEOUT:${DB_POOL_IDLE_TIMEOUT:60000}}
spring.datasource.hikari.max-lifetime=${PROD_DB_POOL_MAX_LIFETIME:${DB_POOL_MAX_LIFETIME:1800000}}
spring.datasource.hikari.connection-timeout=${PROD_DB_POOL_CONNECTION_TIMEOUT:${DB_POOL_CONNECTION_TIMEOUT:20000}}

# JWT configuration - PROD
security.jwt.secret=${PROD_JWT_SECRET:${JWT_PROD_SECRET:${JWT_SECRET:${jwt_secret:}}}}
security.jwt.expiration=${PROD_JWT_EXPIRATION:${JWT_PROD_EXPIRATION:${JWT_EXPIRATION:${jwt_expiration:3600000}}}}

# Web / proxy / cookies - PROD
app.cors.allowed-origin-patterns=${PROD_APP_CORS_ALLOWED_ORIGIN_PATTERNS:${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000}}
app.auth.cookies.domain=${PROD_APP_AUTH_COOKIES_DOMAIN:${APP_AUTH_COOKIES_DOMAIN:}}
app.auth.cookies.secure=${PROD_APP_AUTH_COOKIES_SECURE:${APP_AUTH_COOKIES_SECURE:true}}
app.auth.cookies.same-site=${PROD_APP_AUTH_COOKIES_SAME_SITE:${APP_AUTH_COOKIES_SAME_SITE:None}}
app.security.trust-forwarded-headers=${PROD_APP_SECURITY_TRUST_FORWARDED_HEADERS:${APP_SECURITY_TRUST_FORWARDED_HEADERS:true}}
app.security.permit-swagger-documentation=${PROD_APP_SECURITY_PERMIT_SWAGGER_DOCUMENTATION:${APP_SECURITY_PERMIT_SWAGGER_DOCUMENTATION:false}}
app.security.csrf-cookie-secure=${PROD_APP_SECURITY_CSRF_COOKIE_SECURE:${APP_SECURITY_CSRF_COOKIE_SECURE:true}}
app.security.csrf-cookie-same-site=${PROD_APP_SECURITY_CSRF_COOKIE_SAME_SITE:${APP_SECURITY_CSRF_COOKIE_SAME_SITE:None}}
app.security.csrf-cookie-path=${PROD_APP_SECURITY_CSRF_COOKIE_PATH:${APP_SECURITY_CSRF_COOKIE_PATH:/}}
openapi.server-url=${PROD_OPENAPI_SERVER_URL:${OPENAPI_SERVER_URL:}}

# OpenAPI / Swagger desactivados en produccion
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Actuator: Prometheus y resto; /actuator/prometheus sin JWT (SecurityConfig). Restringe otros endpoints con app.security.actuator-admin-only.
management.endpoints.web.exposure.include=*
management.endpoint.prometheus.enabled=true
management.endpoint.health.show-details=when_authorized

# Stripe (PROD)
stripe.secret-key=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.currency=${STRIPE_CURRENCY:usd}
