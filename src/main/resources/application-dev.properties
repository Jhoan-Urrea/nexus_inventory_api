server.port=8080

# Configuracion base de datos - DEV
spring.datasource.url=${DEV_DB_URL:${DB_DEV_URL:}}
spring.datasource.username=${DEV_DB_USERNAME:${DB_DEV_USER:}}
spring.datasource.password=${DEV_DB_PASSWORD:${DB_DEV_PASSWORD:}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
# Mantiene cambios automaticos al desarrollar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Pool de conexiones (HikariCP) - bajo para no superar limite de conexiones de la BD
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=20000

# JWT configuration - DEV
security.jwt.secret=${DEV_JWT_SECRET:${JWT_DEV_SECRET:${JWT_SECRET:${jwt_secret:}}}}
security.jwt.expiration=${DEV_JWT_EXPIRATION:${JWT_DEV_EXPIRATION:${JWT_EXPIRATION:${jwt_expiration:3600000}}}}

# Web / OpenAPI / security overrides - DEV
app.cors.allowed-origin-patterns=${DEV_APP_CORS_ALLOWED_ORIGIN_PATTERNS:${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000}}
app.security.permit-swagger-documentation=${DEV_APP_SECURITY_PERMIT_SWAGGER_DOCUMENTATION:${APP_SECURITY_PERMIT_SWAGGER_DOCUMENTATION:true}}
openapi.server-url=${DEV_OPENAPI_SERVER_URL:${OPENAPI_SERVER_URL:http://localhost:8080}}

# Swagger explicito en dev
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
